services:
  # ----------------------------------------------------------
  # MySQL
  # ----------------------------------------------------------
  MySQL-8.4:
    image: mysql:8.4
    container_name: prac4-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: prac-4
      MYSQL_USER: prac-4-admin
      MYSQL_PASSWORD: admin
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10
    networks:
      - prac4-network

  # ----------------------------------------------------------
  # phpMyAdmin
  # ----------------------------------------------------------
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: prac4-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: MySQL-8.4
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - MySQL-8.4
    networks:
      - prac4-network

volumes:
  mysql_data:

networks:
  prac4-network:
    driver: bridge
